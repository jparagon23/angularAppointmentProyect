<section id="wrapper" class="login-register login-sidebar" style="background-image:url(../assets/images/tennis.png);">
  <div class="login-box card" style="overflow-y: auto; max-height: 85vh;">
    <div class="card-body">
      <form class="form-horizontal form-material" (ngSubmit)="createUser()" id="registerForm"
        [formGroup]="registerForm">

        <div>

          <a href="javascript:void(0)" class="text-center db"><img src="../assets/images/logo-icon.png"
              alt="Home" /><br /><img src="../assets/images/logo-text.png" alt="Home" /></a>
          <h3 class="box-title m-t-40 m-b-0">Register Now</h3>
          <small>Create your account and enjoy</small>
        </div>

        <div class="form-group">
          <input class="form-control m-0" formControlName="name" type="text" required placeholder="Name"
            [ngClass]="{'has-error': hasError('name')}">
          <app-error-message [control]="registerForm.get('name')"></app-error-message>
        </div>
        <div class="form-group">
          <input class="form-control m-0" formControlName="lastname" type="text" required placeholder="Lastname"
            [ngClass]="{'has-error': hasError('lastname')}">
          <app-error-message [control]="registerForm.get('lastname')"></app-error-message>
        </div>

        <div class="form-group m-t-20">
          <div class="col-xs-12">
            <input class="form-control" formControlName="birthdate" type="date" required placeholder="Birthdate"
              [ngClass]="{'has-error': hasError('birthdate')}">
            <app-error-message [control]="registerForm.get('birthdate')"></app-error-message>
          </div>
        </div>

        <div class="form-group">
          <select class="form-control" formControlName="documentTypeId" required id="documentTypeId"
            [ngClass]="{'has-error': hasError('documentTypeId')}">
            <option value=''>Identification type</option>
            <option *ngFor="let documentType of initialData?.documentTypes" [value]=parseToInt(documentType.id)>
              {{ documentType.description }}
            </option>
          </select>
          <app-error-message [control]="registerForm.get('documentTypeId')"></app-error-message>
        </div>
        <div class="form-group">
          <input class="form-control" formControlName="document" type="text" required placeholder="Document"
            [ngClass]="{'has-error': hasError('document')}">
          <app-error-message [control]="registerForm.get('document')"></app-error-message>

        </div>

        <div class="form-group">
          <select class="form-control" formControlName="phoneTypeId" required id="phoneTypeId"
            [ngClass]="{'has-error': hasError('phoneTypeId')}">
            <option value=''>Phone Type</option>
            <option *ngFor="let phoneType of initialData?.phoneTypes" [value]=parseToInt(phoneType.id)>
              {{ phoneType.description }}
            </option>
          </select>
          <app-error-message [control]="registerForm.get('phoneTypeId')"></app-error-message>

        </div>

        <div class="form-group">
          <input class="form-control" formControlName="phone" type="text" placeholder="Phone"
            [ngClass]="{'has-error': hasError('phone')}">
          <app-error-message [control]="registerForm.get('phone')"></app-error-message>
        </div>

        <div class="form-group m-t-20">
          <div class="col-xs-12">
            <select class="form-control" formControlName="gender" required id="gender"
              [ngClass]="{'has-error': hasError('gender')}">
              <option value>Gender</option>
              <option *ngFor="let gender of initialData?.genders" [value]="gender">
                {{ gender}}
              </option>
            </select>
            <app-error-message [control]="registerForm.get('gender')"></app-error-message>
          </div>
        </div>

        <div class="form-group ">
          <div class="col-xs-12">
            <input class="form-control" formControlName="email" type="text" required placeholder="Email"
              [ngClass]="{'has-error': hasError('email')}">
            <app-error-message [control]="registerForm.get('email')"></app-error-message>
          </div>
        </div>
        <div class="form-group ">
          <div class="col-xs-12">
            <input class="form-control" formControlName="password" type="password" required placeholder="Password"
              [ngClass]="{'has-error': hasError('password')}">
            <app-error-message [control]="registerForm.get('password')"></app-error-message>
          </div>
        </div>
        <div class="form-group">
          <div class="col-xs-12">
            <input class="form-control" formControlName="confirmationPassword" type="password" required
              placeholder="Confirm password" [ngClass]="{'has-error': hasError('confirmationPassword')}">
            <app-error-message [control]="registerForm.get('confirmationPassword')"></app-error-message>
          </div>
        </div>
        <div class="form-group row">
          <div class="col-md-12">
            <div class="checkbox checkbox-primary p-t-0">
              <input id="checkbox-signup" formControlName="allowNotification" type="checkbox">
              <label for="checkbox-signup"> Allow notifications</label>
            </div>
          </div>
        </div>
        <div class="form-group row">
          <div class="col-md-12">
            <div class="checkbox checkbox-primary p-t-0">
              <input id="checkbox-terms" formControlName="agreeTerms" type="checkbox">
              <label for="checkbox-terms"> I agree to all <a href="#">Terms</a></label>
            </div>
          </div>
        </div>
        <div class="form-group text-center m-t-20">
          <div class="col-xs-12">
            <button class="btn btn-info btn-lg btn-block text-uppercase waves-effect waves-light" type="submit">Sign
              Up</button>
          </div>
        </div>
        <div class="form-group m-b-0">
          <div class="col-sm-12 text-center">
            <p>Already have an account? <a href="pages-login-2.html" class="text-info m-l-5"><b>Sign In</b></a></p>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>
